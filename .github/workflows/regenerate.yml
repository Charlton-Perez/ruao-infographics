name: Regenerate infographics

on:
  schedule:
    # 20 minutes after ask_observatory's daily data-fetch workflow (12:00 UTC),
    # so this run picks up that day's new observation.
    - cron: '20 12 * * *'
  workflow_dispatch:   # manual trigger from the Actions tab
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/regenerate.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate infographics
        run: python scripts/hot_days_30.py
        working-directory: scripts

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: regenerate infographics ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push

name: Regenerate infographics

on:
  schedule:
    # Every hour from 10:15 to 15:15 UTC — 15 minutes after each of
    # ask_observatory's hourly data-fetch runs (on the hour, 10:00-15:00),
    # giving that job time to land before we regenerate from its data.
    - cron: '15 10-15 * * *'
  workflow_dispatch:   # manual trigger from the Actions tab
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/regenerate.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate every infographic
        # Runs every .py script found directly inside each scripts/<name>/ folder
        # (skipping scripts/common/, which just holds the shared data loader).
        # Adding a new infographic = adding a new scripts/<name>/ folder; nothing
        # here needs to change.
        run: |
          set -e
          for dir in scripts/*/; do
            name=$(basename "$dir")
            [ "$name" = "common" ] && continue
            for script in "$dir"*.py; do
              [ -e "$script" ] || continue
              echo "── Running $script ──"
              (cd "$dir" && python "$(basename "$script")")
            done
          done

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate infographics ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # Guard against a race with a concurrent push (manual trigger + schedule, etc).
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done

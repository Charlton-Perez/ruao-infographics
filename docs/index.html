<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RUAO Infographics — 2026 vs 1976</title>
<style>
  :root {
    --ink: #2b2118; --bg: #faf7f2; --sub: #6a5c4c; --mute: #9a8c7a;
    --maroon: #8e0915; --line: #e6ded4; --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: Arial, Helvetica, "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }

  .combined img {
    width: 100%; height: auto; display: block; border-radius: 8px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08); background: #fff;
  }
  #updated { font-size: 0.78rem; color: var(--mute); margin: 10px 0 28px; }

  .downloads {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 36px;
  }
  select#dl-select {
    flex: 1; min-width: 220px; padding: 9px 10px; font-size: 0.9rem;
    border: 1px solid #ccc; border-radius: 8px; background: #fff; color: var(--ink);
  }
  button#dl-btn {
    background: var(--maroon); color: #fff; border: none; border-radius: 8px;
    padding: 9px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
  }
  button#dl-btn:hover { background: #6f0710; }

  footer {
    max-width: 1200px; margin: 0 auto; padding: 20px 16px 40px;
    border-top: 1px solid var(--line);
  }
  .footer-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .cc-link { flex-shrink: 0; line-height: 0; }
  .cc-badge { height: 31px; width: auto; display: block; }
  .footer-text {
    flex: 1; min-width: 240px; font-size: 0.78rem; line-height: 1.55; color: var(--mute);
  }
  .footer-text a { color: var(--maroon); text-decoration: none; }
  .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <main>
    <div class="combined">
      <img src="hot_days_1976/hot_days_30.png" alt="2026 vs 1976 — a hot, dry, sunny summer? Full comparison">
    </div>
    <p id="updated"></p>

    <div class="downloads">
      <select id="dl-select">
        <option value="hot_days_1976/hot_days_30.png">Full comparison — all six panels</option>
        <option value="hot_days_1976/panels/hot_ranking.png">Hot — years ranked by 30°C+ days</option>
        <option value="hot_days_1976/panels/dry_ranking.png">Dry — driest summers ranked</option>
        <option value="hot_days_1976/panels/sunny_ranking.png">Sunny — sunniest summers ranked</option>
        <option value="hot_days_1976/panels/hot_decade.png">Hot — 30°C+ days per decade</option>
        <option value="hot_days_1976/panels/dry_decade.png">Dry — average dry days per decade</option>
        <option value="hot_days_1976/panels/sunny_decade.png">Sunny — average sunshine hours per decade</option>
      </select>
      <button id="dl-btn">Download</button>
    </div>
  </main>

  <footer>
    <div class="footer-row">
      <a class="cc-link" href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noreferrer"
         title="Creative Commons Attribution 4.0 International">
        <img class="cc-badge" src="assets/cc-by.png" alt="Creative Commons BY 4.0">
      </a>
      <p class="footer-text">
        Data &amp; figures &copy; University of Reading, licensed under
        <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noreferrer">CC&nbsp;BY&nbsp;4.0</a>.
        Data collected at the
        <a href="https://research.reading.ac.uk/meteorology/atmospheric-observatory/" target="_blank" rel="noreferrer">Atmospheric Observatory</a>.
        Beta — provided as is, with no warranty.
      </p>
    </div>
  </footer>

  <script>
    fetch('hot_days_1976/hot_days_30.png', { method: 'HEAD' }).then(r => {
      const lm = r.headers.get('last-modified');
      if (lm) document.getElementById('updated').textContent =
        'Last regenerated: ' + new Date(lm).toUTCString();
    }).catch(() => {});

    document.getElementById('dl-btn').addEventListener('click', () => {
      const sel = document.getElementById('dl-select');
      const url = sel.value;
      const a = document.createElement('a');
      a.href = url;
      a.download = url.split('/').pop();
      document.body.appendChild(a);
      a.click();
      a.remove();
    });
  </script>
</body>
</html>
